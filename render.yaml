databases:
  - name: ysmen_crm
    databaseName: ysmen_crm
    user: ysmen_crm
    plan: free

services:
  - type: web
    plan: free
    name: ysmen_crm
    env: ruby
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ysmen_crm
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false